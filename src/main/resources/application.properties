spring.application.name=personal-task-manager

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 console (useful during dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Jackson — serialize dates as ISO strings, not timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

